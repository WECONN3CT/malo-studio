<!DOCTYPE html>
<html lang="de">
  <head><meta name="robots" content="noindex,nofollow"/>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Malo Studio</title>
    <link rel="icon" href="/assets/malo-logo-CzsCr6-S.png" />
    <!--
      GitHub-Pages-SPA-Fallback: bewahrt den angefragten Pfad (z. B. /work)
      und leitet auf index.html um, wo der React-Router ihn wiederherstellt.
    -->
    <script>
      sessionStorage.setItem("spa-redirect", location.pathname + location.search + location.hash);
      location.replace("/");
    </script>
    <style>
      body {
        margin: 0;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #1a142b;
        color: #fff;
        font-family: sans-serif;
      }
    </style>
  </head>
  <body>
    <noscript>Bitte aktiviere JavaScript. <a href="/" style="color:#aa8cff">Zur Startseite</a>.</noscript>
  </body>
</html>
